<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home | JForbiz International</title>

  <link rel="stylesheet" href="./styles.css" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
</head>
<body>

<header class="site-header fade-in-on-scroll">
  <div class="brand">
    <div class="brand-text">
      <div class="brand-name">JForbiz</div>
      <div class="brand-subtitle">International</div>
    </div>
  </div>
</header>

<main>

<section class="hero fade-in-on-scroll">
  <img class="hero-img" src="./assets/hero-industrial.jpg" />
</section>

<section class="section fade-in-on-scroll">
  <h2 class="section-title">Locations</h2>
</section>

<section class="map-wrap fade-in-on-scroll">
  <div class="map-stage">
    <div id="map"></div>
  </div>
</section>

<section class="section fade-in-on-scroll">
  <h2 class="section-title">Contact Us</h2>

  <form class="contact-form" id="contact-form">
    <input class="input" type="text" name="name" placeholder="Name" required />
    <input class="input" type="email" name="email" placeholder="Email" required />
    <textarea class="textarea" name="message" placeholder="Add a message" required></textarea>
    <button class="btn" type="submit" id="submit-btn">Submit</button>
    <p class="form-success" id="form-success" style="display:none;">Thank you for reaching out — we'll get back to you shortly.</p>
    <p class="form-error" id="form-error" style="display:none;">Something went wrong. Please try again or email us directly.</p>
  </form>

  <script>
    document.getElementById('contact-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const success = document.getElementById('form-success');
      const error = document.getElementById('form-error');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      try {
        const res = await fetch('https://formsubmit.co/ajax/sales@jforbizinternational.com', {
          method: 'POST',
          headers: { 'Accept': 'application/json' },
          body: new FormData(this)
        });
        if (res.ok) {
          this.reset();
          btn.style.opacity = '0';
          btn.style.pointerEvents = 'none';
          setTimeout(() => { btn.style.display = 'none'; }, 300);
          success.style.display = 'block';
          requestAnimationFrame(() => { success.style.opacity = '1'; });
          setTimeout(() => {
            success.style.opacity = '0';
            setTimeout(() => {
              success.style.display = 'none';
              btn.style.display = '';
              requestAnimationFrame(() => { btn.style.opacity = '1'; btn.style.pointerEvents = ''; });
              btn.disabled = false;
              btn.textContent = 'Submit';
            }, 300);
          }, 5000);
        } else {
          throw new Error();
        }
      } catch {
        error.style.display = 'block';
        success.style.display = 'none';
        btn.disabled = false;
        btn.textContent = 'Submit';
      }
    });
  </script>
</section>

</main>

<footer class="site-footer fade-in-on-scroll">
  <div class="footer-inner">
    Copyright © 2021 JForbiz International - All Rights Reserved.
  </div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="./map.js"></script>
<script src="./scroll.js"></script>

</body>
</html>
