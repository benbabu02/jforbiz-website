    <div class="brand-text">
      <div class="brand-name">JForbiz</div>
      <div class="brand-subtitle">International</div>
    </div>
  </div>

<section class="hero fade-in-on-scroll">

</section>

</section>

<section class="map-wrap fade-in-on-scroll">
  <div class="map-stage">

  </div>

<section class="section fade-in-on-scroll">
  <h2 class="section-title">Contact Us</h2>

    <input class="input" type="text" name="name" placeholder="Name" required />
    <input class="input" type="email" name="email" placeholder="Email" required />
    <textarea class="textarea" name="message" placeholder="Add a message" required></textarea>
